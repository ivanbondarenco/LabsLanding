<!-- Vanilla JS for Typewriter Effect -->
<script>
        document.addEventListener('DOMContentLoaded', function() {
            const words = ["THINGS", "APPS", "WEBS", "STARTUPS", "COMPANYS", "COMMUNITYS"];
            const typewriterElement = document.getElementById('typewriter');
            let wordIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            let typeSpeed = 150; // Typing speed

            function type() {
                const currentWord = words[wordIndex];
                
                if (isDeleting) {
                    // Deleting text
                    typewriterElement.textContent = currentWord.substring(0, charIndex - 1);
                    charIndex--;
                    typeSpeed = 75; // Faster deletion
                } else {
                    // Typing text
                    typewriterElement.textContent = currentWord.substring(0, charIndex + 1);
                    charIndex++;
                    typeSpeed = 150; // Normal typing speed
                }

                if (!isDeleting && charIndex === currentWord.length) {
                    // Finished typing word, pause before deleting
                    isDeleting = true;
                    typeSpeed = 2000; // Wait 2s before deleting
                } else if (isDeleting && charIndex === 0) {
                    // Finished deleting, move to next word
                    isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                    typeSpeed = 500; // Small pause before typing next word
                }

                setTimeout(type, typeSpeed);
            }

            // Start the typing loop
            setTimeout(type, 1000);
        });
    </script>
